# Sibyl Research System Configuration
# Copy to Sibyl system root as config.yaml for machine-level defaults (git-ignored)
# Or to <workspace>/config.yaml for project-specific overrides
# Full reference: docs/configuration.md

# Recommended: use an absolute path outside sibyl-system so projects are physically separated.
# Example: /Users/you/.sibyl/workspaces
workspaces_dir: workspaces

# GPU server (REQUIRED: set these to your actual server)
# Use "default" when ssh-mcp-server is configured with --host/--username directly.
# If your MCP setup resolves a named SSH host from ~/.ssh/config, use that host alias instead.
ssh_server: "default"              # SSH MCP connection name exposed to Sibyl
remote_base: "/home/user/sibyl_system"  # base dir on remote server
max_gpus: 4
remote_env_type: "conda"           # "conda" or "venv"
# remote_conda_path: ""            # empty = auto {remote_base}/miniconda3/bin/conda
# remote_conda_env_name: ""        # empty = sibyl_<project>; set e.g. "base" to reuse an existing env

# GPU polling (for shared servers)
gpu_poll_enabled: true
gpu_free_threshold_mb: 2000
gpu_poll_interval_sec: 600         # 10 minutes
# gpu_aggressive_mode: true
# gpu_aggressive_threshold_pct: 25

# Writing mode: sequential | parallel | codex
writing_mode: parallel

# Experiment mode: ssh_mcp | server_codex | server_claude
experiment_mode: ssh_mcp

# Codex independent review
codex_enabled: false

# Language for control-plane output: "zh" (default) or "en"
# Paper drafting and LaTeX stay in English regardless of this setting.
language: zh

# Feishu/Lark sync
lark_enabled: true

# Iteration control
idea_exp_cycles: 6         # max PIVOT count
idea_validation_rounds: 4  # pilot-guided idea refinement loops before full experiments
max_iterations: 10         # default project-level iteration budget
max_iterations_cap: 100    # reflection can raise/lower max_iterations up to this cap
writing_revision_rounds: 2 # max writing revision rounds
debate_rounds: 2           # debate rounds

# Experiment settings
# experiment_timeout: 300  # seconds per experiment script
# pilot_samples: 16
# pilot_timeout: 600
# pilot_seeds: [42]
# full_seeds: [42, 123, 456]

# Agent-specific settings (optional overrides)
# ideation:
#   model: claude-opus-4-6
#   max_tokens: 64000
#   temperature: 0.9
